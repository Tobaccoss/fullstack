    <h1>Контакти</h1>
    <p>Залиште свої контакти для отримання новин зі світу тварин! Та залиште відгук для кращої роботи сайту!</p>


<form>
    <fieldset>
        <legend>Персональні данні</legend>
        <div>
            <label for="name">Ім'я:</label>
            <input type="text" id="name" name="name">
        </div>

        <div>
            <label for="email">Електронна пошта:</label>
            <input type="email" id="email" name="email">
        </div>

        <div>
            <input type="radio" name="gender" value="male"> Чоловік
            <input type="radio" name="gender" value="female"> Жінка
        </div>
        
        <div>
            <label for="date">Дата народження</label>
            <input type="date" id="date" name="date">
        </div>
    </fieldset>

    <fieldset>
        <legend>Ваш відгук!</legend>
        <div>
            <label for="score">Оцінка:</label>
            <select id="score" name="score">
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
            </select>
        </div>

        <div>
            <input type="checkbox" name="subscribe" value="yes"> Підписатися на новини 
        </div>
        
        <div>
            <label for="text1">Якого звіря ви б хотіли побачити?</label>
            <input type="text" id="text1" name="text1">
        </div>
    </fieldset>
    <input type="submit" value="Надіслати">
</form>
